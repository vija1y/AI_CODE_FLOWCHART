{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="card auth-card shadow">
    <div class="card-body p-4">
      <h3 class="mb-3 text-center"><i class="bi bi-box-arrow-in-right"></i> Login</h3>
      <div id="alert" class="alert alert-danger d-none"></div>
      <form id="loginForm">
        <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" name="password" required></div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
      <p class="mt-3 text-center text-muted">No account? <a href="/register">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script>App.bindAuthForm('loginForm', '/api/login');</script>{% endblock %}
