{% extends "base.html" %}
{% from "_sidebar.html" import sidebar %}
{% block title %}Code Editor{% endblock %}
{% block body %}
<div class="app-shell">
  {{ sidebar('editor') }}
  <main class="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="m-0">Code Editor</h3>
      <div class="d-flex gap-2">
        <select id="lang" class="form-select form-select-sm" style="width:auto">
          <option value="python">Python</option><option value="javascript">JavaScript</option>
          <option value="java">Java</option><option value="cpp">C++</option><option value="c">C</option>
        </select>
        <button class="btn btn-sm btn-primary" id="btnFlow"><i class="bi bi-diagram-3"></i> Flowchart</button>
        <button class="btn btn-sm btn-success" id="btnClassify"><i class="bi bi-cpu"></i> Classify</button>
        <button class="btn btn-sm btn-warning" id="btnExplain"><i class="bi bi-robot"></i> Explain</button>
        <button class="btn btn-sm btn-info text-white" id="btnSuggest"><i class="bi bi-lightbulb"></i> Suggest</button>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-lg-6"><div id="editor" class="editor-host"></div></div>
      <div class="col-lg-6">
        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabFlow">Flowchart</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabAI">AI Output</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabML">ML Result</button></li>
        </ul>
        <div class="tab-content border border-top-0 p-3 bg-white" style="min-height:520px">
          <div class="tab-pane fade show active" id="tabFlow"><div id="mermaidOut" class="mermaid-host"></div></div>
          <div class="tab-pane fade" id="tabAI"><pre id="aiOut" class="ai-out">—</pre></div>
          <div class="tab-pane fade" id="tabML"><div id="mlOut">—</div></div>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock %}
{% block scripts %}<script>App.requireAuth(); App.initEditor();</script>{% endblock %}
