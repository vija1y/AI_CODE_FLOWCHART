{% extends "base.html" %}
{% from "_sidebar.html" import sidebar %}
{% block title %}Flowchart → Code{% endblock %}
{% block body %}
<div class="app-shell">
  {{ sidebar('f2c') }}
  <main class="content">
    <h3>Flowchart → Code (Gemini)</h3>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Mermaid flowchart</label>
        <textarea id="mer" class="form-control" rows="16">flowchart TD
Start([Start]) --> A["Read number n"]
A --> B{"n > 0?"}
B -- Yes --> C["Print positive"]
B -- No --> D["Print non-positive"]
C --> End([End])
D --> End</textarea>
        <div class="mt-2 d-flex gap-2">
          <select id="lang" class="form-select" style="width:auto">
            <option value="python">Python</option><option value="javascript">JavaScript</option>
            <option value="java">Java</option><option value="cpp">C++</option>
          </select>
          <button class="btn btn-primary" id="btnGen"><i class="bi bi-magic"></i> Generate code</button>
        </div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Generated code</label>
        <pre id="out" class="ai-out" style="min-height:380px">—</pre>
        <h6 class="mt-3">Preview</h6>
        <div id="mermaidPreview" class="mermaid-host"></div>
      </div>
    </div>
  </main>
</div>
{% endblock %}
{% block scripts %}<script>App.requireAuth(); App.initF2C();</script>{% endblock %}
