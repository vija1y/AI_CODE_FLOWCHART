{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="card auth-card shadow">
    <div class="card-body p-4">
      <h3 class="mb-3 text-center"><i class="bi bi-person-plus"></i> Register</h3>
      <div id="alert" class="alert alert-danger d-none"></div>
      <form id="registerForm">
        <div class="mb-3"><label class="form-label">Username</label><input class="form-control" name="username" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" name="password" minlength="6" required></div>
        <button class="btn btn-primary w-100" type="submit">Create account</button>
      </form>
      <p class="mt-3 text-center text-muted">Have an account? <a href="/login">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script>App.bindAuthForm('registerForm', '/api/register');</script>{% endblock %}
